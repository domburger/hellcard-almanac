<style>
  .page-title { margin-bottom: 40px; }

  .artifact-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 20px; max-width: 1500px; margin: 0 auto; padding: 0 24px;
  }

  .artifact-card {
    position: relative;
    display: flex; flex-direction: column; align-items: center; text-align: left;
    gap: 10px; padding: 16px 14px 14px;
    border: 1px solid var(--border); background: var(--bg-card); border-radius: 10px;
    transition: transform 0.2s, border-color 0.2s;
  }
  .artifact-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.25);
  }
  .artifact-card.dimmed { opacity: 0.1; }
  .artifact-card.search-match { animation: pulse 1s ease-in-out 3; }
  @keyframes pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }

  .artifact-img {
    width: 100px; height: 100px; border-radius: 0;
    overflow: hidden; flex-shrink: 0;
  }
  .artifact-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .artifact-info { width: 100%; display: flex; flex-direction: column; }

  .artifact-top {
    margin-bottom: 4px; width: 100%;
  }

  .artifact-name {
    font-weight: 800; font-size: 1.05em; line-height: 1.25;
    color: var(--text); padding-right: 30px;
  }

  .gem-badge {
    position: absolute; top: 8px; right: 8px;
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 6px;
    background: rgba(184, 145, 42, 0.18); border: 1px solid rgba(184, 145, 42, 0.35);
    font-size: 0.8em; font-weight: 800; color: #b8912a;
  }

  .artifact-effect {
    font-size: 0.88em; line-height: 1.6; color: var(--text-dim);
  }

  @media (max-width: 1200px) {
    .artifact-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 720px) {
    .artifact-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .artifact-grid { grid-template-columns: 1fr; }
  }

const CLASS_LABELS = {warrior:'Warrior',rogue:'Rogue',mage:'Mage',tinkerer:'Tinkerer',bruja:'Bruja'};

let currentClass = 'warrior';

function getImg(name) {
  return ARTIFACT_IMAGES[name] || '';
}

function getClassFromURL() {
  const params = new URLSearchParams(window.location.search);
  const cls = (params.get('class') || '').toLowerCase();
  if (STARTER_ARTIFACTS[cls]) return cls;
  return 'warrior';
}

function switchClass(cls) {
  if (!STARTER_ARTIFACTS[cls]) return;
  currentClass = cls;
  const url = new URL(window.location);
  url.searchParams.set('class', cls);
  history.replaceState(null, '', url);
  if (typeof updateClassDropdown === 'function') updateClassDropdown(cls);
  buildPage();
  const query = document.getElementById('searchInput').value.trim();
  if (query) applySearch(query);
}

function createCard(artifact) {
  const card = document.createElement('div');
  card.className = 'artifact-card';
  card.dataset.name = artifact.name.toLowerCase();
  card.dataset.effect = artifact.effect.toLowerCase();
  card.dataset.cost = artifact.cost;

  const img = getImg(artifact.name);
  card.innerHTML = `
    <div class="artifact-img">${img ? `<img src="${img}" alt="${artifact.name}" loading="lazy">` : ''}</div>
    <div class="artifact-info">
      <div class="artifact-top">
        <div class="artifact-name">${artifact.name}</div>
        <div class="gem-badge">${artifact.cost}</div>
      </div>
      <div class="artifact-effect">${artifact.effect}</div>
    </div>
  `;
  return card;
}

function buildPage() {
  const container = document.getElementById('artifact-content');
  const cls = currentClass;
  const artifacts = STARTER_ARTIFACTS[cls];
  container.innerHTML = `
    <div class="content-area">
      <h2 class="page-title">${CLASS_LABELS[cls]} Starters</h2>
      <div class="artifact-grid" id="artifactGrid"></div>
    </div>
  `;
  const grid = document.getElementById('artifactGrid');
  for (const a of artifacts) {
    grid.appendChild(createCard(a));
  }
}

function applySearch(query) {
  query = query.toLowerCase().trim();
  const allCards = document.querySelectorAll('.artifact-card');
  let anyVisible = false;
  if (!query) {
    allCards.forEach(c => { c.classList.remove('dimmed', 'search-match'); });
    document.getElementById('noResults').style.display = 'none';
    return;
  }
  allCards.forEach(card => {
    const match = card.dataset.name.includes(query) || card.dataset.effect.includes(query);
    card.classList.toggle('dimmed', !match);
    if (match) { card.classList.add('search-match'); anyVisible = true; }
    else { card.classList.remove('search-match'); }
  });
  document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';
}

document.getElementById('searchInput').addEventListener('input', function() {
  applySearch(this.value);
});

currentClass = getClassFromURL();
if (typeof updateClassDropdown === 'function') updateClassDropdown(currentClass);
buildPage();
</script>

});
</script>
