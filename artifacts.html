<style>
  :root {
    --common: #9e9e9e;
    --rare: #7e57c2;
  }

  /* === CATEGORY SECTIONS === */
  .category-section {
    padding: 32px 24px 16px;
    max-width: 1300px; margin: 0 auto;
  }
  .category-section + .category-section {
    border-top: 2px solid var(--border);
  }
  .category-section h2 {
    font-size: 1.5em; text-align: center;
    margin-bottom: 20px; letter-spacing: 1px;
  }
  .category-section h2.common-title { color: var(--common); }
  .category-section h2.rare-title { color: var(--rare); }
  .category-section h2.legendary-title { color: var(--legendary); }
  .category-section h2.other-title { color: var(--text-dim); }

  .category-count { display: none; }

  /* === ARTIFACT GRID === */
  .artifact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    padding: 0 0 20px;
  }

  /* === ARTIFACT CARD === */
  .artifact-card {
    position: relative; padding: 10px 10px 10px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card);
    cursor: pointer; transition: all 0.2s ease; text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }
  .artifact-card:hover { transform: translateY(-2px); z-index: 10; border-color: rgba(76,175,80,0.4); }
  .artifact-card.common-card { border-color: rgba(158,158,158,0.25); }
  .artifact-card.common-card:hover { border-color: var(--common); }
  .artifact-card.rare-card { border-color: rgba(126,87,194,0.3); }
  .artifact-card.rare-card:hover { border-color: var(--rare); }
  .artifact-card.legendary-card { border-color: rgba(76,175,80,0.4); }
  .artifact-card.legendary-card:hover { border-color: var(--legendary); }
  .artifact-card.other-card { border-color: rgba(136,136,160,0.2); }
  .artifact-card.other-card:hover { border-color: var(--text-dim); }

  .artifact-card.dimmed { opacity: 0.12; transition: opacity 0.3s; }
  .artifact-card.search-match { animation: pulse-highlight 1s ease-in-out 3; }
  @keyframes pulse-highlight { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }

  .artifact-img {
    width: 120px; height: 120px; margin: 0 auto 8px; border-radius: 8px;
    overflow: hidden;
  }
  .artifact-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .artifact-name {
    font-weight: 700; font-size: 0.85em; line-height: 1.3; margin-bottom: 4px;
  }
  .artifact-meta {
    display: flex; justify-content: center; gap: 4px; align-items: center; font-size: 0.72em;
  }
  .artifact-rarity {
    text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; font-size: 0.9em;
  }
  .artifact-rarity.common { color: var(--common); }
  .artifact-rarity.rare { color: var(--rare); }
  .artifact-rarity.legendary { color: var(--legendary); }
  .artifact-rarity.other { color: var(--text-dim); }

  /* === DETAIL PANE === */
  .detail-pane {
    position: fixed; top: 190px; left: 12px; z-index: 1000; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 12px; padding: 0;
    width: 480px; overflow: hidden;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .detail-pane.visible { opacity: 1; pointer-events: auto; }
  .detail-pane .dp-header {
    display: flex; gap: 12px; padding: 14px 16px; align-items: center;
    background: rgba(0,0,0,0.15);
  }
  .detail-pane .dp-img {
    width: 100px; height: 100px; border-radius: 8px; overflow: hidden;
    flex-shrink: 0; background: rgba(0,0,0,0.15);
  }
  .detail-pane .dp-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-pane .dp-info { flex: 1; min-width: 0; }
  .detail-pane .dp-name {
    font-size: 1.2em; font-weight: 700;
    line-height: 1.2; margin-bottom: 6px;
  }
  .detail-pane .dp-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .detail-pane .dp-badge {
    font-size: 0.75em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px;
  }
  .detail-pane .dp-badge.rarity-common { background: rgba(158,158,158,0.2); color: var(--common); }
  .detail-pane .dp-badge.rarity-rare { background: rgba(126,87,194,0.2); color: var(--rare); }
  .detail-pane .dp-badge.rarity-legendary { background: rgba(76,175,80,0.2); color: var(--legendary); }
  .detail-pane .dp-badge.rarity-other { background: rgba(136,136,160,0.15); color: var(--text-dim); }
  .detail-pane .dp-body { padding: 0 16px 14px; }
  .detail-pane .dp-effect {
    font-size: 0.88em; line-height: 1.5; color: var(--text); padding: 10px 12px;
    background: rgba(0,0,0,0.15); border-radius: 6px;
    border-left: 2px solid rgba(76, 175, 80, 0.25);
  }

</style>

function getImg(name) {
  return ARTIFACT_IMAGES[name] || '';
}

function createCard(artifact, rarity) {
  const card = document.createElement('div');
  card.className = `artifact-card ${rarity}-card`;
  card.dataset.name = artifact.name.toLowerCase();
  card.dataset.effect = artifact.effect.toLowerCase();
  card.dataset.rarity = rarity;

  const img = getImg(artifact.name);
  card.innerHTML = `
    <div class="artifact-img">${img ? `<img src="${img}" alt="${artifact.name}" loading="lazy">` : ''}</div>
    <div class="artifact-name">${artifact.name}</div>
    <div class="artifact-meta">
      <span class="artifact-rarity ${rarity}">${rarity}</span>
    </div>
  `;

  card.addEventListener('mouseenter', () => showDetail(artifact, rarity));
  card.addEventListener('mouseleave', hideDetail);
  return card;
}

function showDetail(artifact, rarity) {
  const pane = document.getElementById('detailPane');
  const img = getImg(artifact.name);
  let badges = `<span class="dp-badge rarity-${rarity}">${rarity}</span>`;

  pane.innerHTML = `
    <div class="dp-header">
      <div class="dp-img">${img ? `<img src="${img}" alt="${artifact.name}">` : ''}</div>
      <div class="dp-info">
        <div class="dp-name">${artifact.name}</div>
        <div class="dp-badges">${badges}</div>
      </div>
    </div>
    <div class="dp-body">
      <div class="dp-effect">${artifact.effect}</div>
    </div>
  `;
  pane.classList.add('visible');
}

function hideDetail() {
  document.getElementById('detailPane').classList.remove('visible');
}

function buildPage() {
  const container = document.getElementById('artifact-content');
  let html = '';

  // Common
  html += `<div class="category-section" data-category="common">
    <h2 class="common-title">Common Artifacts</h2>
    <div class="category-count">${ARTIFACTS.common.length} artifacts</div>
    <div class="artifact-grid" id="grid-common"></div>
  </div>`;

  // Rare
  html += `<div class="category-section" data-category="rare">
    <h2 class="rare-title">Rare Artifacts</h2>
    <div class="category-count">${ARTIFACTS.rare.length} artifacts</div>
    <div class="artifact-grid" id="grid-rare"></div>
  </div>`;

  // Legendary
  html += `<div class="category-section" data-category="legendary">
    <h2 class="legendary-title">Legendary Artifacts</h2>
    <div class="category-count">${ARTIFACTS.legendary.length} artifacts</div>
    <div class="artifact-grid" id="grid-legendary"></div>
  </div>`;

  // Other
  html += `<div class="category-section" data-category="other">
    <h2 class="other-title">Other Artifacts</h2>
    <div class="category-count">${ARTIFACTS.other.length} artifacts</div>
    <div class="artifact-grid" id="grid-other"></div>
  </div>`;

  container.innerHTML = html;

  // Populate grids
  const commonGrid = document.getElementById('grid-common');
  for (const a of ARTIFACTS.common) commonGrid.appendChild(createCard(a, 'common'));
  const rareGrid = document.getElementById('grid-rare');
  for (const a of ARTIFACTS.rare) rareGrid.appendChild(createCard(a, 'rare'));
  const legendaryGrid = document.getElementById('grid-legendary');
  for (const a of ARTIFACTS.legendary) legendaryGrid.appendChild(createCard(a, 'legendary'));
  const otherGrid = document.getElementById('grid-other');
  for (const a of ARTIFACTS.other) otherGrid.appendChild(createCard(a, 'other'));
}

buildPage();

// Enhanced search
const searcher = createSearchEnhancer({
  inputId: 'searchInput',
  getItems: function() { return document.querySelectorAll('.artifact-card'); },
  matchFn: function(el, q) {
    return el.dataset.name.includes(q) || el.dataset.effect.includes(q);
  }
});

document.getElementById('searchInput').addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  const allCards = document.querySelectorAll('.artifact-card');
  const allSections = document.querySelectorAll('.category-section');

  if (!query) {
    allCards.forEach(c => { c.classList.remove('dimmed','search-match'); });
    allSections.forEach(s => s.style.display = '');
    document.getElementById('noResults').style.display = 'none';
    return;
  }

  let anyVisible = false;
  allCards.forEach(card => {
    const match = card.dataset.name.includes(query) || card.dataset.effect.includes(query);
    card.classList.toggle('dimmed', !match);
    if (match) { card.classList.add('search-match'); anyVisible = true; }
    else { card.classList.remove('search-match'); }
  });

  allSections.forEach(sec => {
    const hasVisible = sec.querySelector('.artifact-card:not(.dimmed)');
    sec.style.display = hasVisible ? '' : 'none';
  });

  document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';
});
