<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hellcard Almanac - Cards</title>
<link rel="icon" type="image/png" href="https://static.wikia.nocookie.net/hellcard/images/e/e6/Site-logo.png/revision/latest?cb=20240917182248">
<link rel="stylesheet" href="header.css?v=2">
<link rel="stylesheet" href="search-enhance.css">
<style>
  .page-title {
    font-size: 1.4em; font-weight: 700; text-align: center;
    margin-top: 32px; margin-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent);
  }

  .stats-line {
    text-align: center; font-size: 0.9em; color: var(--text-dim);
    margin-bottom: 16px; letter-spacing: 0.5px;
  }
  .stats-line .stat-attack { color: #e57373; }
  .stats-line .stat-skill { color: #64b5f6; }
  .stats-line .stat-influence { color: #ce93d8; }

  .filter-bar {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 1200px; margin: 0 auto 12px; padding: 0 20px;
  }
  .filter-group {
    display: flex; gap: 4px; align-items: center;
  }
  .filter-group-label {
    font-size: 0.75em; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-right: 4px; font-weight: 600;
  }
  .filter-btn {
    padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-dim); font-size: 0.8em;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: rgba(76,175,80,0.4); color: var(--text); }
  .filter-btn.active { background: rgba(76,175,80,0.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }

  .sort-bar {
    display: flex; justify-content: center; gap: 8px; align-items: center;
    max-width: 1200px; margin: 0 auto 16px; padding: 0 20px;
  }
  .sort-bar .filter-group-label { margin-right: 4px; }

  .card-list {
    max-width: 1200px; margin: 0 auto; padding: 0 20px 40px;
  }

  .card-row {
    display: grid;
    grid-template-columns: 36px minmax(140px, 1.2fr) 90px 110px 50px minmax(200px, 3fr);
    align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 6px;
    border: 1px solid transparent; transition: border-color 0.15s, background 0.15s;
  }
  .card-row:nth-child(odd) { background: rgba(255,255,255,0.02); }
  .card-row:nth-child(even) { background: rgba(0,0,0,0.1); }
  .card-row:hover { border-color: rgba(76,175,80,0.3); background: rgba(76,175,80,0.04); }
  .card-row.dimmed { opacity: 0.1; }
  .card-row.search-match { animation: pulse 1s ease-in-out 3; }
  @keyframes pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }

  .card-name {
    font-weight: 700; font-size: 0.92em; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-icon {
    width: 36px; height: 36px; border-radius: 4px; overflow: hidden;
    background: rgba(0,0,0,0.2); flex-shrink: 0;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.75em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; text-align: center;
  }
  .badge-attack { background: rgba(229,115,115,0.15); color: #e57373; border: 1px solid rgba(229,115,115,0.25); }
  .badge-skill { background: rgba(100,181,246,0.15); color: #64b5f6; border: 1px solid rgba(100,181,246,0.25); }
  .badge-influence { background: rgba(206,147,216,0.15); color: #ce93d8; border: 1px solid rgba(206,147,216,0.25); }

  .badge-starter { background: rgba(158,158,158,0.15); color: #9e9e9e; border: 1px solid rgba(158,158,158,0.25); }
  .badge-common { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }
  .badge-rare { background: rgba(100,181,246,0.15); color: #64b5f6; border: 1px solid rgba(100,181,246,0.25); }
  .badge-legendary { background: rgba(76,175,80,0.15); color: var(--accent); border: 1px solid rgba(76,175,80,0.25); }
  .badge-summoned { background: rgba(255,183,77,0.15); color: #ffb74d; border: 1px solid rgba(255,183,77,0.25); }

  .mana-cost {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(66,165,245,0.2); border: 1px solid rgba(66,165,245,0.4);
    color: #42a5f5; font-size: 0.85em; font-weight: 800;
  }

  .card-effect {
    font-size: 0.85em; line-height: 1.45; color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis;
  }

  .list-header {
    display: grid;
    grid-template-columns: 36px minmax(140px, 1.2fr) 90px 110px 50px minmax(200px, 3fr);
    gap: 12px; padding: 6px 12px 8px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .list-header span {
    font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); font-weight: 700;
  }

  @media (max-width: 768px) {
    .card-row, .list-header {
      grid-template-columns: 36px 1fr 60px 80px 40px;
    }
    .card-effect { display: none; }
    .list-header span:last-child { display: none; }
  }
</style>
</head>
<body>
<div id="site-header">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search cards... (e.g. Shield, damage, legendary)">
  </div>
</div>
<script src="header.js?v=3"></script>

<h2 class="page-title">Card List</h2>
<div class="stats-line" id="statsLine"></div>

<div class="filter-bar" id="typeFilters">

    <span class="filter-group-label">Type</span>

    <button class="filter-btn" data-type="Attack">Attack</button>
    <button class="filter-btn" data-type="Skill">Skill</button>
    <button class="filter-btn" data-type="Influence">Influence</button>
  </div>
</div>
<div class="filter-bar" id="rarityFilters">
  <div class="filter-group">
    <span class="filter-group-label">Rarity</span>
    <button class="filter-btn active" data-rarity="all">All</button>
    <button class="filter-btn" data-rarity="Starter">Starter</button>
    <button class="filter-btn" data-rarity="Common">Common</button>
    <button class="filter-btn" data-rarity="Rare">Rare</button>
    <button class="filter-btn" data-rarity="Legendary">Legendary</button>
  </div>
</div>
<div class="sort-bar">
  <div class="filter-group">
    <span class="filter-group-label">Sort</span>
    <button class="filter-btn active" data-sort="default">Default</button>
    <button class="filter-btn" data-sort="cost">Mana Cost</button>
    <button class="filter-btn" data-sort="rarity">Rarity</button>
    <button class="filter-btn" data-sort="type">Type</button>
  </div>
</div>

<div class="card-list" id="cardList">
  <div class="list-header">
    <span></span><span>Name</span><span>Type</span><span>Rarity</span><span>Cost</span><span>Effect</span>
  </div>
</div>

const RARITY_ORDER = {Starter:0, Common:1, Rare:2, Legendary:3, Summoned:4};
const TYPE_ORDER = {Attack: 0, Skill: 1, Influence: 2};

let currentClass = 'warrior';
let activeType = 'all';
let activeRarity = 'all';
let activeSort = 'default';

function getClassFromURL() {
  const params = new URLSearchParams(window.location.search);
  const cls = (params.get('class') || '').toLowerCase();
  if (cls === 'all') return 'all';
  if (CARDS_DATA[cls]) return cls;
  return 'warrior';
}

function switchClass(cls) {
  if (cls !== 'all' && !CARDS_DATA[cls]) return;
  currentClass = cls;
  const url = new URL(window.location);
  url.searchParams.set('class', cls);
  history.replaceState(null, '', url);
  if (typeof updateClassDropdown === 'function') updateClassDropdown(cls);
  buildPage();
  const query = document.getElementById('searchInput').value.trim();
  if (query && window._searchEnhancer) window._searchEnhancer.run(query);
}

function getCards() {
  let cards;
  if (currentClass === 'all') {
    cards = {};
    Object.keys(CARDS_DATA).forEach(function(cls) {
      Object.entries(CARDS_DATA[cls]).forEach(function([id, c]) {
        cards[cls + '_' + id] = Object.assign({}, c, { _class: cls, _origId: id });
      });
    });
  } else {
    cards = CARDS_DATA[currentClass] || {};
  }
  let arr = Object.entries(cards).map(([id, c]) => ({id: c._origId || id, ...c}));

  if (activeType !== 'all') arr = arr.filter(c => c.type === activeType);
  if (activeRarity !== 'all') arr = arr.filter(c => c.rarity === activeRarity);

  if (activeSort === 'default') arr.sort((a, b) => (TYPE_ORDER[a.type]||0) - (TYPE_ORDER[b.type]||0) || (RARITY_ORDER[a.rarity]||0) - (RARITY_ORDER[b.rarity]||0) || a.name.localeCompare(b.name));
  else if (activeSort === 'name') arr.sort((a, b) => a.name.localeCompare(b.name));
  else if (activeSort === 'cost') arr.sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name));
  else if (activeSort === 'rarity') arr.sort((a, b) => (RARITY_ORDER[a.rarity]||0) - (RARITY_ORDER[b.rarity]||0) || a.name.localeCompare(b.name));
  else if (activeSort === 'type') arr.sort((a, b) => a.type.localeCompare(b.type) || a.name.localeCompare(b.name));

  return arr;
}

function getImg(id, cls) {
  if (currentClass === 'all') {
    for (var key in CARD_IMAGES) {
      if (CARD_IMAGES[key][id]) return CARD_IMAGES[key][id];
    }
    return '';
  }
  const imgs = CARD_IMAGES[currentClass] || {};
  return imgs[id] || '';
}

function buildPage() {
  const cards = getCards();
  let allCards;
  if (currentClass === 'all') {
    allCards = [];
    Object.keys(CARDS_DATA).forEach(function(cls) {
      allCards = allCards.concat(Object.values(CARDS_DATA[cls]));
    });
  } else {
    allCards = Object.values(CARDS_DATA[currentClass] || {});
  }
  const atk = allCards.filter(c => c.type === 'Attack').length;
  const skl = allCards.filter(c => c.type === 'Skill').length;
  const inf = allCards.filter(c => c.type === 'Influence').length;

  document.getElementById('statsLine').innerHTML =
    `${allCards.length} Total Cards &middot; <span class="stat-attack">${atk} Attack</span> &middot; <span class="stat-skill">${skl} Skill</span> &middot; <span class="stat-influence">${inf} Influence</span>` +
    (cards.length !== allCards.length ? ` &middot; Showing ${cards.length}` : '');

  const list = document.getElementById('cardList');
  let html = '<div class="list-header"><span></span><span>Name</span><span>Type</span><span>Rarity</span><span>Cost</span><span>Effect</span></div>';

  for (const c of cards) {
    const typeCls = 'badge-' + c.type.toLowerCase();
    const rarCls = 'badge-' + c.rarity.toLowerCase();
    const img = getImg(c.id);
    html += `<div class="card-row" data-name="${c.name}" data-type="${c.type}" data-rarity="${c.rarity}" data-effect="${c.effect.replace(/"/g, '&quot;')}">
      <div class="card-icon">${img ? `<img src="${img}" alt="" loading="lazy">` : ''}</div>
      <div class="card-name">${c.name}</div>
      <div><span class="badge ${typeCls}">${c.type}</span></div>
      <div><span class="badge ${rarCls}">${c.rarity}</span></div>
      <div><span class="mana-cost">${c.cost}</span></div>
      <div class="card-effect">${c.effect}</div>
    </div>`;
  }
  list.innerHTML = html;
}

// Filter buttons
document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeType = this.dataset.type;
    buildPage();
  });
});
document.querySelectorAll('#rarityFilters .filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#rarityFilters .filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeRarity = this.dataset.rarity;
    buildPage();
  });
});
document.querySelectorAll('.sort-bar .filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-bar .filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeSort = this.dataset.sort;
    buildPage();
  });
});

currentClass = getClassFromURL();
if (typeof updateClassDropdown === 'function') updateClassDropdown(currentClass);

// Add "All" button to class bar
(function() {
  var classBar = document.querySelector('.class-bar');
  if (classBar) {
    var allBtn = document.createElement('button');
    allBtn.textContent = 'All';
    allBtn.dataset.class = 'all';
    allBtn.addEventListener('click', function() { switchClass('all'); });
    classBar.insertBefore(allBtn, classBar.firstChild);
  }
})();

buildPage();
</script>
<script src="search-enhance.js"></script>
<script>
window._searchEnhancer = createSearchEnhancer({
  inputId: 'searchInput',
  getItems: function() { return document.querySelectorAll('.card-row:not(.list-header *)'); },
  matchFn: function(el, query) {
    const q = query.toLowerCase();
    const name = (el.dataset.name || '').toLowerCase();
    const type = (el.dataset.type || '').toLowerCase();
    const rarity = (el.dataset.rarity || '').toLowerCase();
    const effect = (el.dataset.effect || '').toLowerCase();
    return name.includes(q) || type.includes(q) || rarity.includes(q) || effect.includes(q);
  }
});
</script>
