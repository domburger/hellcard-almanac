<style>
  /* === VIEW TOGGLE === */
  .view-toggle {
    display: flex; justify-content: center; gap: 0; margin: 16px auto 12px;
    max-width: 1200px;
  }
  .view-toggle-btn {
    padding: 8px 24px; border: none; background: transparent;
    color: var(--text-dim); font-size: 0.9em; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    border-bottom: 2px solid transparent;
    letter-spacing: 0.5px;
  }
  .view-toggle-btn:hover { color: var(--text); }
  .view-toggle-btn.active {
    color: var(--accent); border-bottom-color: var(--accent);
  }

  /* === LIST VIEW STYLES === */
  .stats-line {
    text-align: center; font-size: 0.9em; color: var(--text-dim);
    margin-bottom: 16px; letter-spacing: 0.5px;
  }
  .stats-line .stat-attack { color: #e57373; }
  .stats-line .stat-skill { color: #64b5f6; }
  .stats-line .stat-influence { color: #66bb6a; }

  .filter-bar {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 1200px; margin: 0 auto 12px; padding: 0 20px;
  }
  .filter-group {
    display: flex; gap: 4px; align-items: center;
  }
  .filter-group-label {
    font-size: 0.75em; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-right: 4px; font-weight: 600;
  }
  .filter-btn {
    padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-dim); font-size: 0.8em;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: rgba(76,175,80,0.4); color: var(--text); }
  .filter-btn.active { background: rgba(76,175,80,0.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }

  .sort-bar {
    display: flex; justify-content: center; gap: 8px; align-items: center;
    max-width: 1200px; margin: 0 auto 16px; padding: 0 20px;
  }
  .sort-bar .filter-group-label { margin-right: 4px; }

  .card-list {
    max-width: 1200px; margin: 0 auto; padding: 0 20px 40px;
  }

  .card-row {
    display: grid;
    grid-template-columns: 36px minmax(140px, 1.2fr) 90px 110px 50px minmax(200px, 3fr);
    align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 6px;
    border: 1px solid transparent; transition: border-color 0.15s, background 0.15s;
  }
  .card-row:nth-child(odd) { background: rgba(255,255,255,0.02); }
  .card-row:nth-child(even) { background: rgba(0,0,0,0.1); }
  .card-row:hover { border-color: rgba(76,175,80,0.3); background: rgba(76,175,80,0.04); }
  .card-row.dimmed { opacity: 0.1; }
  .card-row.search-match { animation: pulse 1s ease-in-out 3; }
  @keyframes pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }

  #listView .card-name {
    font-weight: 700; font-size: 0.92em; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-icon {
    width: 36px; height: 36px; border-radius: 4px; overflow: hidden;
    background: rgba(0,0,0,0.2); flex-shrink: 0;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.75em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; text-align: center;
  }
  .badge-attack { background: rgba(229,115,115,0.15); color: #e57373; border: 1px solid rgba(229,115,115,0.25); }
  .badge-skill { background: rgba(100,181,246,0.15); color: #64b5f6; border: 1px solid rgba(100,181,246,0.25); }
  .badge-influence { background: rgba(46,125,50,0.15); color: #66bb6a; border: 1px solid rgba(46,125,50,0.25); }

  .badge-starter { background: rgba(158,158,158,0.15); color: #9e9e9e; border: 1px solid rgba(158,158,158,0.25); }
  .badge-common { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }
  .badge-rare { background: rgba(100,181,246,0.15); color: #64b5f6; border: 1px solid rgba(100,181,246,0.25); }
  .badge-legendary { background: rgba(76,175,80,0.15); color: var(--accent); border: 1px solid rgba(76,175,80,0.25); }
  .badge-summoned { background: rgba(255,183,77,0.15); color: #ffb74d; border: 1px solid rgba(255,183,77,0.25); }

  .mana-cost {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(66,165,245,0.2); border: 1px solid rgba(66,165,245,0.4);
    color: #42a5f5; font-size: 0.85em; font-weight: 800;
  }

  .card-effect {
    font-size: 0.85em; line-height: 1.45; color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis;
  }

  .list-header {
    display: grid;
    grid-template-columns: 36px minmax(140px, 1.2fr) 90px 110px 50px minmax(200px, 3fr);
    gap: 12px; padding: 6px 12px 8px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .list-header span {
    font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); font-weight: 700;
  }

  @media (max-width: 768px) {
    .card-row, .list-header {
      grid-template-columns: 36px 1fr 60px 80px 40px;
    }
    .card-effect { display: none; }
    .list-header span:last-child { display: none; }
  }

  /* === TREE VIEW STYLES === */
  :root {
    --attack: #c62828;
    --attack-bg: #2a1010;
    --attack-border: #8b1a1a;
    --skill: #1565c0;
    --skill-bg: #0d1a2e;
    --skill-border: #0d47a1;
    --influence: #2e7d32;
    --influence-bg: #0d2010;
    --influence-border: #1b5e20;
    --starter: #78909c;
    --common: #9e9e9e;
    --rare: #7e57c2;
    --summoned: #00acc1;
    --line-color: #2a2a30;
    --highlight-line: #4caf50;
  }

  /* === TYPE SECTIONS === */
  .type-section {
    padding: 40px 0 10px;
    border-top: 3px solid var(--border);
  }
  .type-section:first-of-type { border-top: none; }
  .type-section h2 {
    font-family: 'Inter', sans-serif; font-size: 2em; text-align: center; margin-bottom: 4px;
  }
  .type-section .type-desc { text-align: center; color: var(--text-dim); font-size: 0.9em; margin-bottom: 16px; }
  .type-section .type-count { display: none; }

  /* === TIER LABELS === */
  .tier-label {
    text-align: center; font-size: 0.78em; text-transform: uppercase;
    letter-spacing: 2px; font-weight: 700; padding: 8px; margin-bottom: 6px;
  }
  .tier-label.starter-tier { color: var(--starter); }
  .tier-label.common-tier { color: var(--common); }
  .tier-label.rare-tier { color: var(--rare); }
  .tier-label.legendary-tier { color: var(--legendary); }
  .tier-label.summoned-tier { color: var(--summoned); }

  /* === TREE LAYOUT === */
  .tree-wrapper { padding: 0 10px 40px; }

  .flat-tree {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    position: relative; padding: 20px 0;
  }
  .flat-tier {
    display: flex; gap: 5px; justify-content: center;
    position: relative; z-index: 1; flex-wrap: wrap;
  }
  .flat-spacer { height: 20px; position: relative; width: 100%; }

  /* === CARD NODES === */
  .card-node {
    position: relative; width: 104px; min-width: 104px; padding: 5px 5px 6px;
    border-radius: 6px; border: 2px solid var(--border); background: var(--bg-card);
    cursor: pointer; transition: all 0.25s ease; text-align: center; flex-shrink: 0;
  }
  .card-node:hover { transform: translateY(-2px); z-index: 10; }

  .card-node.attack { border-color: var(--attack-border); background: var(--attack-bg); }
  .card-node.attack:hover { border-color: var(--attack); }
  .card-node.skill { border-color: var(--skill-border); background: var(--skill-bg); }
  .card-node.skill:hover { border-color: var(--skill); }
  .card-node.influence { border-color: var(--influence-border); background: var(--influence-bg); }
  .card-node.influence:hover { border-color: var(--influence); }

  .card-node.legendary { border-width: 2px; }
  .card-node.legendary.attack,
  .card-node.legendary.skill,
  .card-node.legendary.influence { border-color: var(--legendary); }
  .card-node.legendary:hover { }

  .card-img { width: 78px; height: 78px; margin: 0 auto 3px; border-radius: 4px; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  #treeView .card-name { font-weight: 700; font-size: 0.65em; line-height: 1.2; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; justify-content: center; gap: 2px; align-items: center; font-size: 0.58em; }
  .card-cost { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-weight: 600; }
  .card-rarity { text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; font-size: 0.85em; }
  .card-rarity.starter { color: var(--starter); }
  .card-rarity.common { color: var(--common); }
  .card-rarity.rare { color: var(--rare); }
  .card-rarity.legendary { color: var(--legendary); }
  .card-rarity.summoned { color: var(--summoned); }

  /* === PATH HIGHLIGHTING === */
  .card-node.path-highlight { filter: brightness(1.4); z-index: 5; }
  .card-node.path-highlight.attack { border-color: #ff5252 !important; }
  .card-node.path-highlight.skill { border-color: #42a5f5 !important; }
  .card-node.path-highlight.influence { border-color: #66bb6a !important; }
  .card-node.path-descendant { filter: brightness(1.2); z-index: 4; }
  .card-node.path-descendant.attack { border-color: #ef9a9a !important; }
  .card-node.path-descendant.skill { border-color: #90caf9 !important; }
  .card-node.path-descendant.influence { border-color: #a5d6a7 !important; }
  .card-node.dimmed { opacity: 0.12; transition: opacity 0.3s; }

  /* === SVG CONNECTOR LINES === */
  .tree-svg line { stroke: var(--line-color); stroke-width: 1.5; opacity: 0.15; transition: all 0.3s; }
  .tree-svg line.line-highlight { stroke: var(--highlight-line); stroke-width: 3; opacity: 1; filter: drop-shadow(0 0 4px var(--gold-glow)); }
  .tree-svg line.line-descendant { stroke-width: 2.5; opacity: 0.75; }
  .flat-tree.tree-attack .tree-svg line.line-descendant { stroke: #ef9a9a; filter: drop-shadow(0 0 3px rgba(239,154,154,0.4)); }
  .flat-tree.tree-skill .tree-svg line.line-descendant { stroke: #90caf9; filter: drop-shadow(0 0 3px rgba(144,202,249,0.4)); }
  .flat-tree.tree-influence .tree-svg line.line-descendant { stroke: #a5d6a7; filter: drop-shadow(0 0 3px rgba(165,214,167,0.4)); }
  .tree-svg line.line-dimmed { opacity: 0.04; }
  .tree-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* === DETAIL PANE (LEFT SIDE) === */
  .detail-pane {
    position: fixed; top: 190px; left: 12px; z-index: 1000; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 12px; padding: 0;
    width: 364px; overflow: hidden;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .detail-pane.visible { opacity: 1; pointer-events: auto; }
  .detail-pane .tt-header { display: flex; gap: 12px; padding: 16px; align-items: center; background: rgba(0,0,0,0.15); }
  .detail-pane .tt-img { width: 84px; height: 84px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: rgba(0,0,0,0.15); }
  .detail-pane .tt-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-pane .tt-info { flex: 1; min-width: 0; }
  .detail-pane .tt-name { font-size: 1.1em; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
  .detail-pane .tt-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .detail-pane .tt-badge { font-size: 0.72em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; }
  .detail-pane .tt-badge.type-attack { background: rgba(198,40,40,0.2); color: var(--attack); }
  .detail-pane .tt-badge.type-skill { background: rgba(21,101,192,0.2); color: var(--skill); }
  .detail-pane .tt-badge.type-influence { background: rgba(46,125,50,0.2); color: var(--influence); }
  .detail-pane .tt-badge.rarity-starter { background: rgba(120,144,156,0.2); color: var(--starter); }
  .detail-pane .tt-badge.rarity-common { background: rgba(158,158,158,0.2); color: #9e9e9e; }
  .detail-pane .tt-badge.rarity-rare { background: rgba(126,87,194,0.2); color: var(--rare); }
  .detail-pane .tt-badge.rarity-legendary { background: rgba(76,175,80,0.2); color: var(--legendary); }
  .detail-pane .tt-badge.rarity-summoned { background: rgba(255,183,77,0.2); color: var(--summoned); }
  .detail-pane .tt-mana { display: flex; align-items: center; gap: 4px; font-size: 0.88em; margin-top: 6px; color: #90caf9; font-weight: 600; }
  .detail-pane .tt-mana-gem { width: 18px; height: 18px; background: #3366dd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75em; color: #fff; font-weight: 800; }
  .detail-pane .tt-body { padding: 0 16px 16px; }
  .detail-pane .tt-effect { font-size: 0.88em; line-height: 1.55; color: var(--text); padding: 10px 12px; background: rgba(0,0,0,0.15); border-radius: 6px; border-left: 2px solid rgba(76, 175, 80, 0.25); }
  .detail-pane .tt-transforms { margin-top: 8px; font-size: 0.8em; color: var(--text-dim); line-height: 1.5; }
  .detail-pane .tt-transforms strong { color: var(--text); }
  .detail-pane .tt-arrow-up { color: var(--accent); }
  .detail-pane .tt-arrow-down { color: #ef5350; }

  /* === SEARCH MATCH (tree) === */
  .card-node.search-match { animation: pulse-highlight 1s ease-in-out 3; }
  @keyframes pulse-highlight { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }

  /* === HIDE/SHOW VIEWS === */
  #listView { display: none; }
  #treeView { display: block; }
  #treeView.active { display: block; }
  #listView.active { display: block; }

  /* === MOBILE STYLES === */
  @media (max-width: 768px) {
    .view-toggle { margin: 10px auto 8px; }
    .view-toggle-btn { padding: 6px 16px; font-size: 0.82em; }

    .page-title { font-size: 1.1em; margin-top: 16px; margin-bottom: 8px; }
    .stats-line { font-size: 0.8em; margin-bottom: 10px; }

    .filter-bar { padding: 0 12px; gap: 4px; margin-bottom: 8px; }
    .filter-btn { padding: 3px 8px; font-size: 0.72em; }
    .filter-group-label { font-size: 0.68em; }
    .sort-bar { padding: 0 12px; margin-bottom: 10px; }

    .card-list { padding: 0 8px 24px; }
    .list-header { display: none; }
    .card-row {
      grid-template-columns: 36px 1fr auto auto;
      gap: 6px; padding: 8px 8px;
    }
    .card-effect { display: none; }
    .badge { font-size: 0.65em; padding: 2px 5px; }
    .mana-cost { width: 20px; height: 20px; font-size: 0.75em; }

    /* Tree view mobile — wrap cards instead of scrolling */
    .type-section { padding: 20px 0 6px; }
    .type-section h2 { font-size: 1.3em; }
    .tree-wrapper { padding: 0 4px 20px; }
    .flat-tree { align-items: center; }
    .flat-tier { gap: 4px; flex-wrap: wrap; justify-content: center; }
    .card-node { width: 80px; min-width: 80px; padding: 4px 3px 5px; }
    .card-img { width: 60px; height: 60px; }
    .card-node .card-name { font-size: 0.55em; }
    .card-meta { font-size: 0.5em; }
    .tier-label { font-size: 0.68em; padding: 5px; }
    .tree-svg { display: none; }

    /* Detail pane on mobile: bottom sheet instead of fixed left */
    .detail-pane {
      position: fixed; top: auto; bottom: 0; left: 0; right: 0;
      width: 100%; max-height: 50vh; overflow-y: auto;
      border-radius: 12px 12px 0 0;
    }
  }

  @media (max-width: 480px) {
    .card-row {
      grid-template-columns: 32px 1fr auto;
      gap: 4px; padding: 6px 6px;
    }
    .card-row > div:nth-child(4),
    .card-row > div:nth-child(5) { display: none; }
    .card-icon { width: 32px; height: 32px; }
    #listView .card-name { font-size: 0.82em; }
  }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8683615884499373" crossorigin="anonymous"></script>
</head>
<body>

<div id="site-header">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search cards... (e.g. Shield, damage, legendary)">
  </div>
</div>
<script src="header.js?v=4"></script>


<!-- View Toggle -->
<div class="view-toggle">
  <button class="view-toggle-btn active" data-view="tree">Tree</button>
  <button class="view-toggle-btn" data-view="list">List</button>
</div>

<!-- LIST VIEW -->
<div id="listView">
<h2 class="page-title">Card List</h2>
<div class="stats-line" id="statsLine"></div>

<div class="filter-bar" id="typeFilters">
  <div class="filter-group">
    <span class="filter-group-label">Type</span>
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="Attack">Attack</button>
    <button class="filter-btn" data-type="Skill">Skill</button>
    <button class="filter-btn" data-type="Influence">Influence</button>
  </div>
</div>
<div class="filter-bar" id="rarityFilters">
  <div class="filter-group">
    <span class="filter-group-label">Rarity</span>
    <button class="filter-btn active" data-rarity="all">All</button>
    <button class="filter-btn" data-rarity="Starter">Starter</button>
    <button class="filter-btn" data-rarity="Common">Common</button>
    <button class="filter-btn" data-rarity="Rare">Rare</button>
    <button class="filter-btn" data-rarity="Legendary">Legendary</button>
  </div>
</div>
<div class="sort-bar">
  <div class="filter-group">
    <span class="filter-group-label">Sort</span>
    <button class="filter-btn active" data-sort="default">Default</button>
    <button class="filter-btn" data-sort="cost">Mana Cost</button>
    <button class="filter-btn" data-sort="rarity">Rarity</button>
    <button class="filter-btn" data-sort="type">Type</button>
  </div>
</div>

<div class="card-list" id="cardList">
  <div class="list-header">
    <span></span><span>Name</span><span>Type</span><span>Rarity</span><span>Cost</span><span>Effect</span>
  </div>
</div>
</div>

<!-- TREE VIEW -->
<div id="treeView">
<div class="detail-pane" id="detailPane"></div>
<div id="all-trees"></div>
</div>

<script>
// ===== CARDS_DATA (flat list data with effects - used by list view) =====
const CARDS_DATA = {
warrior: {
"sword-slash":{name:"Sword Slash",type:"Attack",rarity:"Starter",cost:1,effect:"Deal 2 damage. If target is far, deal 1 damage instead."},
"mighty-blow":{name:"Mighty Blow",type:"Attack",rarity:"Common",cost:2,effect:"Deal 2 damage in a medium radius. Random monster in radius is dealt additional 2 damage."},
"slam":{name:"Slam",type:"Attack",rarity:"Common",cost:2,effect:"Deal 3 damage in a medium radius. Lose block. Get Disarm."},
"short-sword":{name:"Short Sword",type:"Attack",rarity:"Common",cost:1,effect:"Deal 4 damage. If monster is far, deal 2 damage instead."},
"heavy-sword":{name:"Heavy Sword",type:"Attack",rarity:"Common",cost:1,effect:"Deal 3 damage. Use 2 Stamina for additional 2 damage."},
"sacrificial-lunge":{name:"Sacrificial Lunge",type:"Attack",rarity:"Common",cost:1,effect:"Deal 8 damage minus your current block. Discard all Skill cards from hand."},
"swords-akimbo":{name:"Swords Akimbo",type:"Attack",rarity:"Common",cost:1,effect:"Deal 5 damage in a wide cone. Strain."},
"initiative":{name:"Initiative",type:"Attack",rarity:"Common",cost:1,effect:"Deal 3 damage. Deal 5 damage if target's intent is attack."},
"boomerang-shield":{name:"Boomerang Shield",type:"Attack",rarity:"Common",cost:1,effect:"Deal damage equal to your block to the first monster in a long narrow cone."},

  warrior:  { cards: WARRIOR_CARDS, imgs: WARRIOR_IMGS, name: 'Warrior', color: '#ff6b35' },
  bruja:    { cards: BRUJA_CARDS, imgs: BRUJA_IMGS, name: 'Bruja', color: '#9c27b0' },

  rogue:    { cards: ROGUE_CARDS, imgs: ROGUE_IMGS, name: 'Rogue', color: '#2e7d32' },
  mage:     { cards: MAGE_CARDS, imgs: MAGE_IMGS, name: 'Mage', color: '#4488ff' }
};

// Process each class: build nameToId, backfill from[], fix starter evolution
for (const cls of Object.keys(CLASS_DATA)) {
  const CARDS = CLASS_DATA[cls].cards;
  const nameToId = {};
  for (const [id, c] of Object.entries(CARDS)) nameToId[c.name] = id;
  CLASS_DATA[cls].nameToId = nameToId;

  // Backfill from[] using to[]
  for (const [id, c] of Object.entries(CARDS)) {
    c.to.forEach(targetName => {
      const tid = nameToId[targetName];
      if (tid && !CARDS[tid].from.includes(c.name)) CARDS[tid].from.push(c.name);
    });
  }

}



// ===== SHARED STATE =====
const RARITY_ORDER = {Starter:0, Common:1, Rare:2, Legendary:3, Summoned:4};
const TYPE_ORDER = {Attack: 0, Skill: 1, Influence: 2};

let currentClass = 'warrior';
let activeType = 'all';
let activeRarity = 'all';
let activeSort = 'default';
let activeView = 'tree';

function getClassFromURL() {
  const params = new URLSearchParams(window.location.search);
  const cls = (params.get('class') || '').toLowerCase();
  if (cls === 'all') return 'all';
  if (CARDS_DATA[cls]) return cls;
  return 'warrior';
}

// ===== UNIFIED switchClass =====
function switchClass(cls) {
  if (cls !== 'all' && !CARDS_DATA[cls]) return;
  currentClass = cls;
  const url = new URL(window.location);
  url.searchParams.set('class', cls);
  history.replaceState(null, '', url);
  if (typeof updateClassDropdown === 'function') updateClassDropdown(cls);

  // Update list view
  buildPage();

  // Update tree view if visible and not "all"
  if (activeView === 'tree' && cls !== 'all' && CLASS_DATA[cls]) {
    buildTree(cls);

    document.getElementById('all-trees').innerHTML = '<p style="text-align:center;color:var(--text-dim);padding:40px;">Select a specific class to view evolution trees.</p>';
  }

  const query = document.getElementById('searchInput').value.trim();
  if (query && window._searchEnhancer) window._searchEnhancer.run(query);
}

// ===== LIST VIEW LOGIC =====
function getCards() {
  let cards;
  if (currentClass === 'all') {
    cards = {};
    Object.keys(CARDS_DATA).forEach(function(cls) {
      Object.entries(CARDS_DATA[cls]).forEach(function([id, c]) {
        cards[cls + '_' + id] = Object.assign({}, c, { _class: cls, _origId: id });
      });
    });
  } else {
    cards = CARDS_DATA[currentClass] || {};
  }
  let arr = Object.entries(cards).map(([id, c]) => ({id: c._origId || id, ...c}));

  if (activeType !== 'all') arr = arr.filter(c => c.type === activeType);
  if (activeRarity !== 'all') arr = arr.filter(c => c.rarity === activeRarity);

  if (activeSort === 'default') arr.sort((a, b) => (TYPE_ORDER[a.type]||0) - (TYPE_ORDER[b.type]||0) || (RARITY_ORDER[a.rarity]||0) - (RARITY_ORDER[b.rarity]||0) || a.name.localeCompare(b.name));
  else if (activeSort === 'name') arr.sort((a, b) => a.name.localeCompare(b.name));
  else if (activeSort === 'cost') arr.sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name));
  else if (activeSort === 'rarity') arr.sort((a, b) => (RARITY_ORDER[a.rarity]||0) - (RARITY_ORDER[b.rarity]||0) || a.name.localeCompare(b.name));
  else if (activeSort === 'type') arr.sort((a, b) => a.type.localeCompare(b.type) || a.name.localeCompare(b.name));

  return arr;
}

function getImg(id, cls) {
  if (currentClass === 'all') {
    for (var key in CARD_IMAGES) {
      if (CARD_IMAGES[key][id]) return CARD_IMAGES[key][id];
    }
    return '';
  }
  const imgs = CARD_IMAGES[currentClass] || {};
  return imgs[id] || '';
}

function buildPage() {
  const cards = getCards();
  let allCards;
  if (currentClass === 'all') {
    allCards = [];
    Object.keys(CARDS_DATA).forEach(function(cls) {
      allCards = allCards.concat(Object.values(CARDS_DATA[cls]));
    });

    allCards = Object.values(CARDS_DATA[currentClass] || {});
  }
  const atk = allCards.filter(c => c.type === 'Attack').length;
  const skl = allCards.filter(c => c.type === 'Skill').length;
  const inf = allCards.filter(c => c.type === 'Influence').length;

    `${allCards.length} Total Cards &middot; <span class="stat-attack">${atk} Attack</span> &middot; <span class="stat-skill">${skl} Skill</span> &middot; <span class="stat-influence">${inf} Influence</span>` +
    (cards.length !== allCards.length ? ` &middot; Showing ${cards.length}` : '');

  const list = document.getElementById('cardList');
  let html = '<div class="list-header"><span></span><span>Name</span><span>Type</span><span>Rarity</span><span>Cost</span><span>Effect</span></div>';

  for (const c of cards) {
    const typeCls = 'badge-' + c.type.toLowerCase();
    const rarCls = 'badge-' + c.rarity.toLowerCase();
    const img = getImg(c.id);
    html += `<div class="card-row" data-name="${c.name}" data-type="${c.type}" data-rarity="${c.rarity}" data-effect="${c.effect.replace(/"/g, '&quot;')}">
      <div class="card-icon">${img ? `<img src="${img}" alt="" loading="lazy">` : ''}</div>
      <div class="card-name">${c.name}</div>
      <div><span class="badge ${typeCls}">${c.type}</span></div>
      <div><span class="badge ${rarCls}">${c.rarity}</span></div>
      <div><span class="mana-cost">${c.cost}</span></div>
      <div class="card-effect">${c.effect}</div>

  }
  list.innerHTML = html;
}

// ===== TREE VIEW LOGIC =====
// The tree logic uses 'activeClass' - alias to currentClass
Object.defineProperty(window, 'activeClass', { get() { return currentClass; }, set(v) { currentClass = v; } });
function buildTree(cls) {
  const data = CLASS_DATA[cls];
  const CARDS = data.cards;
  const IMGS = data.imgs;
  const nameToId = data.nameToId;

  const TYPE_CONFIG = {
    Attack:    { color: 'var(--attack)',    desc: '', count: 0 },
    Skill:     { color: 'var(--skill)',     desc: '', count: 0 },
    Influence: { color: 'var(--influence)', desc: '', count: 0 }
  };

  const grouped = {};
  for (const type of ['Attack','Skill','Influence']) {
    grouped[type] = { Starter: [], Common: [], Rare: [], Legendary: [], Summoned: [] };
  }
  for (const [id, c] of Object.entries(CARDS)) {
    if (!grouped[c.type]) continue;
    if (!grouped[c.type][c.rarity]) grouped[c.type][c.rarity] = [];
    grouped[c.type][c.rarity].push(id);
    TYPE_CONFIG[c.type].count++;
  }

  // Sort within each rarity
  for (const type of Object.keys(grouped)) {
    for (const rarity of Object.keys(grouped[type])) {
      grouped[type][rarity].sort((a, b) => {
        const ca = CARDS[a], cb = CARDS[b];
        if (ca.from.length === 0 && cb.from.length > 0) return -1;
        if (ca.from.length > 0 && cb.from.length === 0) return 1;
        return ca.name.localeCompare(cb.name);
      });
    }
  }

  function cardHTML(id) {
    const c = CARDS[id];
    const img = IMGS[id] || '';
    const typeClass = c.type.toLowerCase();
    const rarityClass = c.rarity.toLowerCase();
    const legendaryClass = c.rarity === 'Legendary' ? ' legendary' : '';
    const fromIds = c.from.map(n => nameToId[n]).filter(Boolean).join(',');
    const dataFrom = fromIds ? ` data-from="${fromIds}"` : '';
    return `<div class="card-node ${typeClass}${legendaryClass}" data-card="${id}"${dataFrom}>
      <div class="card-img">${img ? `<img src="${img}" alt="${c.name}" loading="lazy">` : ''}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-meta"><span class="card-cost">${c.cost}</span><span class="card-rarity ${rarityClass}">${c.rarity}</span></div>
    </div>`;
  }

  const container = document.getElementById('all-trees');
  let html = '';

  for (const type of ['Attack','Skill','Influence']) {
    const cfg = TYPE_CONFIG[type];
    const g = grouped[type];
    const typeClass = type.toLowerCase();

    html += `<div class="type-section">
      <h2 style="color:${cfg.color}">${type} Cards</h2>
      <div class="type-count">${cfg.count} cards</div>
    </div>`;
    html += `<div class="tree-wrapper"><div class="flat-tree tree-${typeClass}">`;

    const tiers = [];
    if (g.Starter && g.Starter.length) tiers.push({ label:'starter', title:'Starter', star:true, cards:g.Starter });
    if (g.Common && g.Common.length)  tiers.push({ label:'common',  title:'Common',  star:false, cards:g.Common });
    if (g.Rare && g.Rare.length)    tiers.push({ label:'rare',    title:'Rare',    star:false, cards:g.Rare });
    if (g.Legendary && g.Legendary.length) tiers.push({ label:'legendary', title:'Legendary', star:true, cards:g.Legendary });
    if (g.Summoned && g.Summoned.length) tiers.push({ label:'summoned', title:'Summoned', star:false, cards:g.Summoned });

    tiers.forEach(tier => {
      html += `<div class="tier-label ${tier.label}-tier">${tier.star ? '★ ' : ''}${tier.title}</div>`;
      html += `<div class="flat-tier" data-tier="${tier.label}">`;
      tier.cards.forEach(id => { html += cardHTML(id); });
      html += `</div><div class="flat-spacer"></div>`;
    });

    html += `</div></div>`;
  }

  container.innerHTML = html;
  setTimeout(drawConnectors, 100);
}

// Draw connector lines
function drawConnectors() {
  document.querySelectorAll('.flat-tree').forEach(tree => {
    const existing = tree.querySelector('.tree-svg');
    if (existing) existing.remove();

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('tree-svg');
    svg.style.width = tree.scrollWidth + 'px';
    svg.style.height = tree.scrollHeight + 'px';

    const treeRect = tree.getBoundingClientRect();
    tree.querySelectorAll('.card-node[data-from]').forEach(card => {
      const fromIds = card.dataset.from.split(',');
      const cardRect = card.getBoundingClientRect();
      const toX = cardRect.left + cardRect.width / 2 - treeRect.left + tree.scrollLeft;
      const toY = cardRect.top - treeRect.top + tree.scrollTop;

      fromIds.forEach(fid => {
        const fromCard = tree.querySelector(`[data-card="${fid.trim()}"]`);
        if (!fromCard) return;
        const fromRect = fromCard.getBoundingClientRect();
        const fromX = fromRect.left + fromRect.width / 2 - treeRect.left + tree.scrollLeft;
        const fromY = fromRect.bottom - treeRect.top + tree.scrollTop;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fromX);
        line.setAttribute('y1', fromY);
        line.setAttribute('x2', toX);
        line.setAttribute('y2', toY);
        line.dataset.from = fid.trim();
        line.dataset.to = card.dataset.card;
        svg.appendChild(line);
      });
    });

    tree.style.position = 'relative';
    tree.insertBefore(svg, tree.firstChild);
  });
}

window.addEventListener('resize', () => setTimeout(drawConnectors, 100));

// Path highlight helpers
function getAncestors(tree, cardEl, visited) {
  visited = visited || new Set();
  const ids = new Set();
  const cardId = cardEl.dataset.card;
  if (visited.has(cardId)) return ids;
  visited.add(cardId);
  ids.add(cardId);
  const fromStr = cardEl.dataset.from;
  if (!fromStr) return ids;
  fromStr.split(',').forEach(fid => {
    const parent = tree.querySelector(`[data-card="${fid.trim()}"]`);
    if (parent) getAncestors(tree, parent, visited).forEach(id => ids.add(id));
  });
  return ids;
}

function getDescendants(tree, cardEl, visited) {
  visited = visited || new Set();
  const ids = new Set();
  const cardId = cardEl.dataset.card;
  if (visited.has(cardId)) return ids;
  visited.add(cardId);
  ids.add(cardId);
  const data = CLASS_DATA[activeClass];
  const c = data.cards[cardId];
  if (!c || !c.to.length) return ids;
  c.to.forEach(name => {
    const childId = data.nameToId[name];
    if (!childId) return;
    const child = tree.querySelector(`[data-card="${childId}"]`);
    if (child) getDescendants(tree, child, visited).forEach(id => ids.add(id));
  });
  return ids;
}

// Hover handlers
document.addEventListener('mouseover', e => {
  const node = e.target.closest('.card-node');
  if (!node) return;
  const tree = node.closest('.flat-tree');
  if (!tree) return;

  const ancestorIds = getAncestors(tree, node);
  const descendantIds = getDescendants(tree, node);

  tree.querySelectorAll('.card-node').forEach(c => {
    const id = c.dataset.card;
    c.classList.remove('path-highlight', 'path-descendant', 'dimmed');
    if (ancestorIds.has(id)) c.classList.add('path-highlight');
    else if (descendantIds.has(id)) c.classList.add('path-descendant');
    else c.classList.add('dimmed');
  });
  tree.querySelectorAll('.tree-svg line').forEach(line => {
    line.classList.remove('line-highlight', 'line-descendant', 'line-dimmed');
    const f = line.dataset.from, t = line.dataset.to;
    if (ancestorIds.has(f) && ancestorIds.has(t)) line.classList.add('line-highlight');
    else if (descendantIds.has(f) && descendantIds.has(t)) line.classList.add('line-descendant');
    else line.classList.add('line-dimmed');
  });
  showDetail(node);
});

document.addEventListener('mouseout', e => {
  const node = e.target.closest('.card-node');
  if (!node) return;
  const related = e.relatedTarget;
  if (related && related.closest && related.closest('.card-node') === node) return;
  const tree = node.closest('.flat-tree');
  if (tree) {
    tree.querySelectorAll('.card-node').forEach(c => { c.classList.remove('path-highlight','path-descendant','dimmed'); });
    tree.querySelectorAll('.tree-svg line').forEach(l => { l.classList.remove('line-highlight','line-descendant','line-dimmed'); });
  }
  detailPane.classList.remove('visible');
});

// Touch/click handler for mobile
let activeNode = null;
document.addEventListener('click', e => {
  const node = e.target.closest('.card-node');
  if (node) {
    if (activeNode === node) {
      activeNode = null;
      const tree = node.closest('.flat-tree');
      if (tree) {
        tree.querySelectorAll('.card-node').forEach(c => { c.classList.remove('path-highlight','path-descendant','dimmed'); });
      }
      detailPane.classList.remove('visible');
      return;
    }
    activeNode = node;
    const tree = node.closest('.flat-tree');
    if (tree) {
      const ancestorIds = getAncestors(tree, node);
      const descendantIds = getDescendants(tree, node);
      tree.querySelectorAll('.card-node').forEach(c => {
        const id = c.dataset.card;
        c.classList.remove('path-highlight', 'path-descendant', 'dimmed');
        if (ancestorIds.has(id)) c.classList.add('path-highlight');
        else if (descendantIds.has(id)) c.classList.add('path-descendant');
        else c.classList.add('dimmed');
      });
    }
    showDetail(node);
  } else if (!e.target.closest('.detail-pane')) {
    if (activeNode) {
      const tree = activeNode.closest('.flat-tree');
      if (tree) {
        tree.querySelectorAll('.card-node').forEach(c => { c.classList.remove('path-highlight','path-descendant','dimmed'); });
      }
      activeNode = null;
      detailPane.classList.remove('visible');
    }
  }
});

// (Search and init handled below in unified section)

// ===== UNIFIED SEARCH =====
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (activeView === 'list') {
    // List view search
    document.querySelectorAll('.card-row:not(.list-header *)').forEach(row => {
      if (!q) { row.classList.remove('dimmed','search-match'); return; }
      const text = `${row.dataset.name || ''} ${row.dataset.type || ''} ${row.dataset.rarity || ''} ${row.dataset.effect || ''}`.toLowerCase();
      if (text.includes(q)) { row.classList.remove('dimmed'); row.classList.add('search-match'); }
      else { row.classList.add('dimmed'); row.classList.remove('search-match'); }
    });
  } else {
    // Tree view search
    if (!CLASS_DATA[currentClass]) return;
    const CARDS = CLASS_DATA[currentClass].cards;
    document.querySelectorAll('.card-node').forEach(node => {
      const c = CARDS[node.dataset.card];
      if (!q) { node.classList.remove('dimmed','search-match'); return; }
      if (!c) { node.classList.add('dimmed'); return; }
      const text = `${c.name} ${c.type} ${c.rarity} ${c.effect}`.toLowerCase();
      if (text.includes(q)) { node.classList.remove('dimmed'); node.classList.add('search-match'); }
      else { node.classList.add('dimmed'); node.classList.remove('search-match'); }
    });
  }
});

// ===== INITIALIZATION =====
currentClass = getClassFromURL();
if (typeof updateClassDropdown === 'function') updateClassDropdown(currentClass);

// Add "All" button to class bar
(function() {
  var classBar = document.querySelector('.class-bar');
  if (classBar) {
    var allBtn = document.createElement('button');
    allBtn.textContent = 'All';
    allBtn.dataset.class = 'all';
    allBtn.addEventListener('click', function() { switchClass('all'); });
    classBar.insertBefore(allBtn, classBar.firstChild);
  }
})();

buildPage();
if (currentClass !== 'all' && CLASS_DATA[currentClass]) {
  buildTree(currentClass);
}
</script>
<script src="search-enhance.js?v=1"></script>
<script>
window._searchEnhancer = createSearchEnhancer({
  inputId: 'searchInput',
  getItems: function() {
    if (activeView === 'list') {
      return document.querySelectorAll('.card-row:not(.list-header *)');
    } else {
      return document.querySelectorAll('.card-node:not(.dimmed)');
    }
  },
  matchFn: function(el, query) {
    const q = query.toLowerCase();
    if (activeView === 'list') {
      const name = (el.dataset.name || '').toLowerCase();
      const type = (el.dataset.type || '').toLowerCase();
      const rarity = (el.dataset.rarity || '').toLowerCase();
      const effect = (el.dataset.effect || '').toLowerCase();
      return name.includes(q) || type.includes(q) || rarity.includes(q) || effect.includes(q);
    } else {
      if (!CLASS_DATA[currentClass]) return false;
      var c = CLASS_DATA[currentClass].cards[el.dataset.card];
      if (!c) return false;
      var text = (c.name + ' ' + c.type + ' ' + c.rarity + ' ' + c.effect).toLowerCase();
      return text.includes(q);
    }
  }
});
</script>
