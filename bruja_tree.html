<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hellcard Almanac - Bruja Tree</title>
<link rel="icon" type="image/png" href="https://static.wikia.nocookie.net/hellcard/images/e/e6/Site-logo.png/revision/latest?cb=20240917182248">
<link rel="stylesheet" href="search-enhance.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-dark: #0d0d12;
    --bg-card: #1a1a24;
    --bg-panel: #14141e;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --attack: #c62828;
    --attack-bg: #2a1010;
    --attack-border: #8b1a1a;
    --skill: #1565c0;
    --skill-bg: #0d1a2e;
    --skill-border: #0d47a1;
    --influence: #2e7d32;
    --influence-bg: #0d2010;
    --influence-border: #1b5e20;
    --starter: #78909c;
    --common: #9e9e9e;
    --rare: #7e57c2;
    --legendary: #4caf50;
    --gold-glow: rgba(76, 175, 80, 0.3);
    --line-color: #2a2a30;
    --highlight-line: #4caf50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
    background: linear-gradient(180deg, #1a0a1e 0%, var(--bg-dark) 100%);
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.8em;
    font-weight: 900;
    background: linear-gradient(135deg, #388e3c, #4caf50, #388e3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }

  header .subtitle { color: var(--text-dim); font-size: 1.1em; margin-top: 8px; font-weight: 300; }

  .legend {
    display: flex; justify-content: center; gap: 24px; padding: 16px 20px; flex-wrap: wrap;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
  }
  .legend-group { display: flex; gap: 12px; align-items: center; }
  .legend-group .label { color: var(--text-dim); font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-dot.attack { background: var(--attack); }
  .legend-dot.skill { background: var(--skill); }
  .legend-dot.influence { background: var(--influence); }
  .legend-dot.starter { background: var(--starter); border: 1px solid #aaa; }
  .legend-dot.common { background: var(--common); }
  .legend-dot.rare { background: var(--rare); }
  .legend-dot.legendary { background: var(--legendary); }

  .stats-bar {
    display: flex; justify-content: center; gap: 30px; padding: 12px 20px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border); font-size: 0.85em;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-num { font-weight: 700; font-size: 1.1em; }
  .stat-label { color: var(--text-dim); }

  .search-bar {
    display: flex; justify-content: center; padding: 16px 20px; background: var(--bg-panel);
    position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 16px; color: var(--text); font-size: 0.95em; width: 360px;
    outline: none; font-family: 'Inter', sans-serif;
  }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-bar input:focus { border-color: var(--legendary); }

  .type-section {
    padding: 50px 0 10px;
    border-top: 3px solid var(--border);
  }
  .type-section:first-of-type { border-top: none; }
  .type-section h2 {
    font-family: 'Cinzel', serif; font-size: 2.2em; text-align: center; margin-bottom: 4px;
  }
  .type-section .type-desc { text-align: center; color: var(--text-dim); font-size: 0.95em; margin-bottom: 20px; }
  .type-section .type-count {
    text-align: center; font-size: 0.8em; color: var(--text-dim); margin-bottom: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .tier-label {
    text-align: center; font-size: 0.7em; text-transform: uppercase;
    letter-spacing: 2px; font-weight: 700; padding: 8px; margin-bottom: 6px;
  }
  .tier-label.starter-tier { color: var(--starter); }
  .tier-label.common-tier { color: var(--common); }
  .tier-label.rare-tier { color: var(--rare); }
  .tier-label.legendary-tier { color: var(--legendary); }

  .tree-wrapper { padding: 0 10px 40px; }

  .flat-tree {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    position: relative; padding: 20px 0;
  }
  .flat-tier {
    display: flex; gap: 5px; justify-content: center;
    position: relative; z-index: 1; flex-wrap: wrap;
  }
  .flat-spacer { height: 20px; position: relative; width: 100%; }

  .card-node {
    position: relative; width: 64px; min-width: 64px; padding: 3px 3px 4px;
    border-radius: 6px; border: 2px solid var(--border); background: var(--bg-card);
    cursor: pointer; transition: all 0.25s ease; text-align: center; flex-shrink: 0;
  }
  .card-node:hover { transform: translateY(-2px); z-index: 10; }

  .card-node.attack { border-color: var(--attack-border); background: var(--attack-bg); }
  .card-node.attack:hover { border-color: var(--attack); box-shadow: 0 4px 20px rgba(198,40,40,0.3); }
  .card-node.skill { border-color: var(--skill-border); background: var(--skill-bg); }
  .card-node.skill:hover { border-color: var(--skill); box-shadow: 0 4px 20px rgba(21,101,192,0.3); }
  .card-node.influence { border-color: var(--influence-border); background: var(--influence-bg); }
  .card-node.influence:hover { border-color: var(--influence); box-shadow: 0 4px 20px rgba(46,125,50,0.3); }

  .card-node.legendary { border-width: 2px; }
  .card-node.legendary.attack,
  .card-node.legendary.skill,
  .card-node.legendary.influence { border-color: var(--legendary); box-shadow: 0 0 8px var(--gold-glow); }
  .card-node.legendary:hover { box-shadow: 0 4px 25px var(--gold-glow); }

  .card-img { width: 48px; height: 48px; margin: 0 auto 2px; border-radius: 4px; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .card-name { font-weight: 700; font-size: 0.52em; line-height: 1.1; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; justify-content: center; gap: 2px; align-items: center; font-size: 0.48em; }
  .card-cost { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-weight: 600; }
  .card-rarity { text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; font-size: 0.85em; }
  .card-rarity.starter { color: var(--starter); }
  .card-rarity.common { color: var(--common); }
  .card-rarity.rare { color: var(--rare); }
  .card-rarity.legendary { color: var(--legendary); }

  .card-node.path-highlight { filter: brightness(1.4); z-index: 5; }
  .card-node.path-highlight.attack { border-color: #ff5252 !important; box-shadow: 0 0 15px rgba(255,82,82,0.5) !important; }
  .card-node.path-highlight.skill { border-color: #42a5f5 !important; box-shadow: 0 0 15px rgba(66,165,245,0.5) !important; }
  .card-node.path-highlight.influence { border-color: #66bb6a !important; box-shadow: 0 0 15px rgba(102,187,106,0.5) !important; }
  .card-node.path-descendant { filter: brightness(1.2); z-index: 4; }
  .card-node.path-descendant.attack { border-color: #ef9a9a !important; box-shadow: 0 0 12px rgba(239,154,154,0.4) !important; }
  .card-node.path-descendant.skill { border-color: #90caf9 !important; box-shadow: 0 0 12px rgba(144,202,249,0.4) !important; }
  .card-node.path-descendant.influence { border-color: #a5d6a7 !important; box-shadow: 0 0 12px rgba(165,214,167,0.4) !important; }
  .card-node.dimmed { opacity: 0.12; transition: opacity 0.3s; }

  .tree-svg line { stroke: var(--line-color); stroke-width: 1.5; opacity: 0.15; transition: all 0.3s; }
  .tree-svg line.line-highlight { stroke: var(--highlight-line); stroke-width: 3; opacity: 1; filter: drop-shadow(0 0 4px var(--gold-glow)); }
  .tree-svg line.line-descendant { stroke-width: 2.5; opacity: 0.75; }
  .flat-tree.tree-attack .tree-svg line.line-descendant { stroke: #ef9a9a; filter: drop-shadow(0 0 3px rgba(239,154,154,0.4)); }
  .flat-tree.tree-skill .tree-svg line.line-descendant { stroke: #90caf9; filter: drop-shadow(0 0 3px rgba(144,202,249,0.4)); }
  .flat-tree.tree-influence .tree-svg line.line-descendant { stroke: #a5d6a7; filter: drop-shadow(0 0 3px rgba(165,214,167,0.4)); }
  .tree-svg line.line-dimmed { opacity: 0.04; }
  .tree-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  .detail-pane {
    position: fixed; top: 80px; right: 12px; z-index: 1000; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 12px; padding: 0;
    width: 364px; overflow: hidden;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .detail-pane.visible { opacity: 1; pointer-events: auto; }
  .detail-pane .tt-header { display: flex; gap: 12px; padding: 16px; align-items: center; background: rgba(0,0,0,0.15); }
  .detail-pane .tt-img { width: 84px; height: 84px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: rgba(0,0,0,0.15); }
  .detail-pane .tt-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-pane .tt-info { flex: 1; min-width: 0; }
  .detail-pane .tt-name { font-size: 1.1em; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
  .detail-pane .tt-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .detail-pane .tt-badge { font-size: 0.72em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; }
  .detail-pane .tt-badge.type-attack { background: rgba(198,40,40,0.2); color: var(--attack); }
  .detail-pane .tt-badge.type-skill { background: rgba(21,101,192,0.2); color: var(--skill); }
  .detail-pane .tt-badge.type-influence { background: rgba(46,125,50,0.2); color: var(--influence); }
  .detail-pane .tt-badge.rarity-starter { background: rgba(120,144,156,0.2); color: var(--starter); }
  .detail-pane .tt-badge.rarity-common { background: rgba(158,158,158,0.2); color: #9e9e9e; }
  .detail-pane .tt-badge.rarity-rare { background: rgba(126,87,194,0.2); color: var(--rare); }
  .detail-pane .tt-badge.rarity-legendary { background: rgba(76,175,80,0.2); color: var(--legendary); }
  .detail-pane .tt-mana { display: flex; align-items: center; gap: 4px; font-size: 0.88em; margin-top: 6px; color: #90caf9; font-weight: 600; }
  .detail-pane .tt-mana-gem { width: 18px; height: 18px; background: #3366dd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75em; color: #fff; font-weight: 800; }
  .detail-pane .tt-body { padding: 0 16px 16px; }
  .detail-pane .tt-effect { font-size: 0.88em; line-height: 1.55; color: var(--text); padding: 10px 12px; background: rgba(0,0,0,0.15); border-radius: 6px; border-left: 2px solid rgba(76, 175, 80, 0.25); }
  .detail-pane .tt-transforms { margin-top: 8px; font-size: 0.8em; color: var(--text-dim); line-height: 1.5; }
  .detail-pane .tt-transforms strong { color: var(--text); }
  .detail-pane .tt-arrow-up { color: var(--accent); }
  .detail-pane .tt-arrow-down { color: #ef5350; }

  .card-node.search-match { animation: pulse-highlight 1s ease-in-out 3; }
  @keyframes pulse-highlight { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
</style>
</head>

<div class="detail-pane" id="detailPane"></div>

// Build name->id lookup and backfill from[] using to[]
const nameToId = {};
for (const [id, c] of Object.entries(CARDS)) nameToId[c.name] = id;
for (const [id, c] of Object.entries(CARDS)) {
  c.to.forEach(targetName => {
    const tid = nameToId[targetName];
    if (tid && !CARDS[tid].from.includes(c.name)) CARDS[tid].from.push(c.name);
  });
}
// Starters evolve to all Commons of the same type
const starters = Object.entries(CARDS).filter(([,c]) => c.rarity === 'Starter');
for (const [sid, sc] of starters) {
  Object.entries(CARDS).filter(([,c]) => c.rarity === 'Common' && c.type === sc.type).forEach(([cid, cc]) => {
    if (!sc.to.includes(cc.name)) sc.to.push(cc.name);
    if (!cc.from.includes(sc.name)) cc.from.push(sc.name);
  });
}

// Build the 3 unified trees from card data
const RARITY_ORDER = { Starter: 0, Common: 1, Rare: 2, Legendary: 3 };
const TYPE_CONFIG = {
  Attack:    { color: 'var(--attack)',    desc: 'Deal damage to enemies &mdash; blood magic, curses, and pain', count: 0 },
  Skill:     { color: 'var(--skill)',     desc: 'Blood rituals, healing, wards, and transformation', count: 0 },
  Influence: { color: 'var(--influence)', desc: 'Persistent effects &mdash; curses, shields, and dark pacts', count: 0 }
};

// Group cards by type and rarity
const grouped = {};
for (const type of ['Attack','Skill','Influence']) {
  grouped[type] = { Starter: [], Common: [], Rare: [], Legendary: [] };
}
for (const [id, c] of Object.entries(CARDS)) {
  grouped[c.type][c.rarity].push(id);
  TYPE_CONFIG[c.type].count++;
}

// Sort within each rarity: roots first (no from), then alphabetical
for (const type of Object.keys(grouped)) {
  for (const rarity of Object.keys(grouped[type])) {
    grouped[type][rarity].sort((a, b) => {
      const ca = CARDS[a], cb = CARDS[b];
      if (ca.from.length === 0 && cb.from.length > 0) return -1;
      if (ca.from.length > 0 && cb.from.length === 0) return 1;
      return ca.name.localeCompare(cb.name);
    });
  }
}

function cardHTML(id) {
  const c = CARDS[id];
  const img = IMGS[id] || '';
  const typeClass = c.type.toLowerCase();
  const rarityClass = c.rarity.toLowerCase();
  const legendaryClass = c.rarity === 'Legendary' ? ' legendary' : '';
  const fromIds = c.from.map(n => nameToId[n]).filter(Boolean).join(',');
  const dataFrom = fromIds ? ` data-from="${fromIds}"` : '';
  return `<div class="card-node ${typeClass}${legendaryClass}" data-card="${id}"${dataFrom}>
    <div class="card-img">${img ? `<img src="${img}" alt="${c.name}" loading="lazy">` : ''}</div>
    <div class="card-name">${c.name}</div>
    <div class="card-meta"><span class="card-cost">${c.cost}</span><span class="card-rarity ${rarityClass}">${c.rarity}</span></div>
  </div>`;
}

const container = document.getElementById('all-trees');
let html = '';

for (const type of ['Attack','Skill','Influence']) {
  const cfg = TYPE_CONFIG[type];
  const g = grouped[type];
  const typeClass = type.toLowerCase();

  html += `<div class="type-section">
    <h2 style="color:${cfg.color}">${type} Cards</h2>
    <div class="type-count">${cfg.count} cards</div>
    <p class="type-desc">${cfg.desc}</p>
  </div>`;
  html += `<div class="tree-wrapper"><div class="flat-tree tree-${typeClass}">`;

  const tiers = [];
  if (g.Starter.length) tiers.push({ label:'starter', title:'Starter', star:true, cards:g.Starter });
  if (g.Common.length)  tiers.push({ label:'common',  title:'Common',  star:false, cards:g.Common });
  if (g.Rare.length)    tiers.push({ label:'rare',    title:'Rare',    star:false, cards:g.Rare });
  if (g.Legendary.length) tiers.push({ label:'legendary', title:'Legendary', star:true, cards:g.Legendary });

  tiers.forEach(tier => {
    html += `<div class="tier-label ${tier.label}-tier">${tier.star ? '★ ' : ''}${tier.title}</div>`;
    html += `<div class="flat-tier" data-tier="${tier.label}">`;
    tier.cards.forEach(id => { html += cardHTML(id); });
    html += `</div><div class="flat-spacer"></div>`;
  });

  html += `</div></div>`;
}

container.innerHTML = html;

// Draw connector lines
function drawConnectors() {
  document.querySelectorAll('.flat-tree').forEach(tree => {
    const existing = tree.querySelector('.tree-svg');
    if (existing) existing.remove();

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('tree-svg');
    svg.style.width = tree.scrollWidth + 'px';
    svg.style.height = tree.scrollHeight + 'px';

    const treeRect = tree.getBoundingClientRect();
    tree.querySelectorAll('.card-node[data-from]').forEach(card => {
      const fromIds = card.dataset.from.split(',');
      const cardRect = card.getBoundingClientRect();
      const toX = cardRect.left + cardRect.width / 2 - treeRect.left + tree.scrollLeft;
      const toY = cardRect.top - treeRect.top + tree.scrollTop;

      fromIds.forEach(fid => {
        const fromCard = tree.querySelector(`[data-card="${fid.trim()}"]`);
        if (!fromCard) return;
        const fromRect = fromCard.getBoundingClientRect();
        const fromX = fromRect.left + fromRect.width / 2 - treeRect.left + tree.scrollLeft;
        const fromY = fromRect.bottom - treeRect.top + tree.scrollTop;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fromX);
        line.setAttribute('y1', fromY);
        line.setAttribute('x2', toX);
        line.setAttribute('y2', toY);
        line.dataset.from = fid.trim();
        line.dataset.to = card.dataset.card;
        svg.appendChild(line);
      });
    });

    tree.style.position = 'relative';
    tree.insertBefore(svg, tree.firstChild);
  });
}

setTimeout(drawConnectors, 300);
window.addEventListener('resize', () => setTimeout(drawConnectors, 100));

// Detail pane
const detailPane = document.getElementById('detailPane');

function showDetail(node) {
  const id = node.dataset.card;

  if (c.to.length) h += `<div class="tt-transforms"><span class="tt-arrow-up">▲</span> <strong>Evolves to:</strong> ${c.to.join(', ')}</div>`;
  if (c.from.length) h += `<div class="tt-transforms"><span class="tt-arrow-down">▼</span> <strong>Evolves from:</strong> ${c.from.join(', ')}</div>`;
  h += `</div>`;
  detailPane.innerHTML = h;
  detailPane.classList.add('visible');
}

// Path highlight: walk up ancestors
function getAncestors(tree, cardEl, visited = new Set()) {
  const ids = new Set();
  const cardId = cardEl.dataset.card;
  if (visited.has(cardId)) return ids;
  visited.add(cardId);
  ids.add(cardId);
  const fromStr = cardEl.dataset.from;
  if (!fromStr) return ids;
  fromStr.split(',').forEach(fid => {
    const parent = tree.querySelector(`[data-card="${fid.trim()}"]`);
    if (parent) getAncestors(tree, parent, visited).forEach(id => ids.add(id));
  });
  return ids;
}

function getDescendants(tree, cardEl, visited = new Set()) {
  const ids = new Set();
  const cardId = cardEl.dataset.card;
  if (visited.has(cardId)) return ids;
  visited.add(cardId);
  ids.add(cardId);
  const c = CARDS[cardId];
  if (!c || !c.to.length) return ids;
  c.to.forEach(name => {
    const childId = nameToId[name];
    if (!childId) return;
    const child = tree.querySelector(`[data-card="${childId}"]`);
    if (child) getDescendants(tree, child, visited).forEach(id => ids.add(id));
  });
  return ids;
}

document.addEventListener('mouseover', e => {
  const node = e.target.closest('.card-node');
  if (!node) return;
  const tree = node.closest('.flat-tree');
  if (!tree) return;

  const hoveredId = node.dataset.card;
  const ancestorIds = getAncestors(tree, node);
  const descendantIds = getDescendants(tree, node);

  tree.querySelectorAll('.card-node').forEach(c => {
    const id = c.dataset.card;
    c.classList.remove('path-highlight', 'path-descendant', 'dimmed');
    if (ancestorIds.has(id)) c.classList.add('path-highlight');
    else if (descendantIds.has(id)) c.classList.add('path-descendant');
    else c.classList.add('dimmed');
  });
  tree.querySelectorAll('.tree-svg line').forEach(line => {
    line.classList.remove('line-highlight', 'line-descendant', 'line-dimmed');
    const f = line.dataset.from, t = line.dataset.to;
    const fAnc = ancestorIds.has(f), tAnc = ancestorIds.has(t);
    const fDesc = descendantIds.has(f), tDesc = descendantIds.has(t);
    if (fAnc && tAnc) line.classList.add('line-highlight');
    else if (fDesc && tDesc) line.classList.add('line-descendant');
    else line.classList.add('line-dimmed');
  });
  showDetail(node);
});

document.addEventListener('mouseout', e => {
  const node = e.target.closest('.card-node');
  if (!node) return;
  const related = e.relatedTarget;
  if (related && related.closest && related.closest('.card-node') === node) return;
  const tree = node.closest('.flat-tree');
  if (tree) {
    tree.querySelectorAll('.card-node').forEach(c => { c.classList.remove('path-highlight','path-descendant','dimmed'); });
    tree.querySelectorAll('.tree-svg line').forEach(l => { l.classList.remove('line-highlight','line-descendant','line-dimmed'); });
  }
  detailPane.classList.remove('visible');
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.card-node').forEach(node => {
    const c = CARDS[node.dataset.card];
    if (!q) { node.classList.remove('dimmed','search-match'); return; }
    if (!c) { node.classList.add('dimmed'); return; }
    const text = `${c.name} ${c.type} ${c.rarity} ${c.effect}`.toLowerCase();
    if (text.includes(q)) { node.classList.remove('dimmed'); node.classList.add('search-match'); }
    else { node.classList.add('dimmed'); node.classList.remove('search-match'); }
  });
});
